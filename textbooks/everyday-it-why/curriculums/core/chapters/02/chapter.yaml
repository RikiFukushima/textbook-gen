id: "02"
title: なぜこの数字なの? — コンピュータの「キリのいい数字」
estimated_minutes: 16
learning_objectives:
  - 8bit = 1byte、256、1024 が「キリのいい数字」である理由を 2 進数から説明できる
  - 1KB = 1000 バイトか 1024 バイトか問題の背景を説明できる
  - 80 番・443 番などポート番号の数字の意味を説明できる
  - ゼロから数える理由とオフバイワンエラーの関係を説明できる
