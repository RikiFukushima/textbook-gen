id: "02"
title: プロンプトで思い通りに近づける
estimated_minutes: 24
learning_objectives:
  - 「何を・どう動く・どこから撮る・どんな雰囲気」というプロンプトの型を使って指示を書ける
  - 被写体・動き・カメラワーク・雰囲気を具体的な言葉で指定できる
  - 動画が破綻する理由を理解し、プロンプトの直し方で対処できる
  - 画像から動かす方法と、同じキャラ・雰囲気を保つコツを説明できる
