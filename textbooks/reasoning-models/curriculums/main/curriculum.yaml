id: main
title: 推論モデル入門
description: o1・DeepSeek-R1・Claude・Gemini などの「推論モデル(Reasoning Models)」を、なぜ「考えてから答える」と急に強くなるのかという原理から広く浅く見渡す入門。test-time compute(推論時計算)の直感、得意・不得意、通常モデルとの使い分けに加え、2026 年時点の最前線(extended thinking・ディープリサーチ)と、推論モデルが自律エージェント(ループ)を実用化させた関係までを、数式に深入りせず案内する。
