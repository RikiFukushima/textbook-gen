name: Deploy viewer to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: viewer/package-lock.json

      - name: Install
        working-directory: viewer
        run: npm ci

      - name: Build (static export)
        working-directory: viewer
        env:
          # プロジェクトページ用の basePath。リポジトリ名に合わせる。
          NEXT_PUBLIC_BASE_PATH: /textbook-gen
          # 公開ビルドは public / unlisted の教材のみ含める(誤公開防止)。
          BUILD_VISIBILITY: public,unlisted
        run: |
          npm run build
          touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: viewer/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
